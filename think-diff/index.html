<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A Morning of Culture & Knowledge — Raíces de Vida</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --rv-wine: #6E1C1F;
    --rv-wine-deep: #4E1214;
    --rv-wine-soft: #8E3134;
    --rv-terracotta: #D9724E;
    --rv-terracotta-deep: #B85936;
    --rv-rose: #B9636A;
    --rv-sage: #8A9F7E;
    --rv-moss: #5E7253;
    --rv-sun: #F5B947;
    --rv-sand: #E8C8A0;
    --rv-cream: #F5EADB;
    --rv-paper: #FBF4E8;
    --rv-paper-warm: #FFF3DE;
    --rv-ink: #2B1A14;
    --font-serif: "Lora", Georgia, serif;
    --font-display: "Cormorant Garamond", "Lora", serif;
    --font-script: "Caveat", "Bradley Hand", cursive;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--rv-paper-warm); color: var(--rv-ink); font-family: var(--font-serif); -webkit-font-smoothing: antialiased; }
  img { max-width: 100%; display: block; }
  a { color: inherit; }

  /* ============================================================
     RESPONSIVE — tablet ≤900px, phone ≤640px, small phone ≤380px
     Inline React styles win, so we use !important to override.
     ============================================================ */

  /* ---------- TABLET (≤ 900px) ---------- */
  @media (max-width: 900px) {
    .rv-nav-inner         { padding: 12px 20px !important; gap: 12px !important; }
    .rv-nav-link          { display: none !important; }
    .rv-nav-cta           { padding: 9px 16px !important; font-size: 13px !important; }
    .rv-nav-lang          { padding: 7px 12px !important; font-size: 11px !important; margin-left: 4px !important; }
    .rv-nav-bname         { font-size: 18px !important; }
    .rv-nav-bsub          { font-size: 10px !important; }
    .rv-brand-logo        { width: 38px !important; height: 38px !important; }

    .rv-hero-inner        { grid-template-columns: 1fr !important; gap: 40px !important; padding: 48px 24px 40px !important; }
    .rv-hero-title        { font-size: clamp(46px, 10vw, 72px) !important; letter-spacing: -1.5px !important; }
    .rv-hero-eyebrow      { font-size: 28px !important; }
    .rv-hero-kicker       { font-size: 17px !important; margin-top: 20px !important; }
    .rv-hero-meta         { gap: 20px !important; margin-top: 24px !important; }
    .rv-hero-meta-val     { font-size: 18px !important; }
    .rv-hero-btns         { margin-top: 28px !important; }
    .rv-hero-btn          { padding: 15px 22px !important; font-size: 15px !important; }
    .rv-hero-photo        { max-width: 520px; margin: 0 auto; width: 100%; }
    .rv-hero-photoname    { font-size: 26px !important; }

    .rv-section-pad       { padding: 72px 24px !important; }
    .rv-head-title        { font-size: 52px !important; letter-spacing: -1px !important; }
    .rv-head-label        { font-size: 30px !important; }

    .rv-talk1-grid        { grid-template-columns: 1fr !important; }
    .rv-talk1-content     { padding: 40px 32px 36px !important; }
    .rv-talk1-title       { font-size: clamp(34px, 6vw, 48px) !important; }
    .rv-talk1-title-end   { font-size: 18px !important; }
    .rv-talk1-body        { font-size: 16px !important; }
    .rv-talk1-photo-col   { min-height: 360px !important; }
    .rv-talk1-speaker-name{ font-size: 22px !important; }

    .rv-talk2-card        { padding: 48px 36px 44px !important; border-radius: 20px !important; }
    .rv-talk2-title       { font-size: clamp(36px, 7vw, 58px) !important; letter-spacing: -1.2px !important; }
    .rv-talk2-grid        { grid-template-columns: 1fr !important; gap: 32px !important; margin-top: 36px !important; }
    .rv-talk2-body        { font-size: 17px !important; }
    .rv-talk2-time-val    { font-size: 34px !important; }

    .rv-prog-row          { grid-template-columns: 84px 1fr !important; gap: 16px !important; padding: 18px 20px !important; }
    .rv-prog-time         { font-size: 26px !important; }
    .rv-prog-h            { font-size: 22px !important; }
    .rv-prog-d            { font-size: 14px !important; }
    .rv-prog-star         { display: none !important; }

    .rv-tix-title         { font-size: 64px !important; letter-spacing: -1.5px !important; }
    .rv-tix-grid          { grid-template-columns: 1fr !important; gap: 16px !important; }
    .rv-tix-card          { padding: 32px 28px !important; }
    .rv-tix-label         { font-size: 24px !important; }
    .rv-tix-amount        { font-size: 80px !important; }
    .rv-tix-cause         { font-size: 19px !important; margin-top: 32px !important; }

    .rv-cta-wrap          { padding: 40px 20px 80px !important; }
    .rv-cta-box           { padding: 48px 32px !important; border-radius: 22px !important; }
    .rv-cta-grid          { grid-template-columns: 1fr !important; gap: 36px !important; }
    .rv-cta-title         { font-size: 48px !important; letter-spacing: -1px !important; }
    .rv-cta-body          { font-size: 16px !important; }
    .rv-cta-btn           { padding: 20px 26px !important; font-size: 16px !important; }

    .rv-footer-inner      { flex-direction: column !important; text-align: center !important; gap: 14px !important; }
  }

  /* ---------- PHONE (≤ 640px) ---------- */
  @media (max-width: 640px) {
    .rv-nav-inner         { padding: 10px 16px !important; }
    .rv-nav-bsub          { display: none !important; }
    .rv-nav-bname         { font-size: 17px !important; }
    .rv-nav-cta           { padding: 8px 13px !important; font-size: 12px !important; letter-spacing: 0.2px !important; }
    .rv-nav-lang          { padding: 6px 10px !important; font-size: 10px !important; }

    .rv-hero-inner        { padding: 36px 18px 32px !important; gap: 32px !important; }
    .rv-hero-title        { font-size: clamp(38px, 11vw, 54px) !important; line-height: 0.96 !important; }
    .rv-hero-eyebrow      { font-size: 24px !important; }
    .rv-hero-kicker       { font-size: 16px !important; }
    .rv-hero-atp          { top: 14px !important; right: 14px !important; padding: 6px 10px !important; font-size: 10px !important; }
    .rv-hero-phototag     { top: 14px !important; left: 14px !important; padding: 7px 12px !important; font-size: 11px !important; }
    .rv-hero-photocaption { padding: 24px 18px 18px !important; }
    .rv-hero-photoname    { font-size: 22px !important; }
    .rv-hero-photometa    { font-size: 12px !important; }
    .rv-hero-btns         { flex-direction: column !important; align-items: stretch !important; }
    .rv-hero-btn          { text-align: center; }

    .rv-section-pad       { padding: 56px 18px !important; }
    .rv-head-title        { font-size: 40px !important; }
    .rv-head-label        { font-size: 26px !important; }

    .rv-talk1-content     { padding: 32px 22px 28px !important; }
    .rv-talk1-title       { font-size: 32px !important; letter-spacing: -0.8px !important; }
    .rv-talk1-title-end   { font-size: 16px !important; margin-top: 10px !important; }
    .rv-talk1-body        { font-size: 15px !important; }
    .rv-talk1-photo-col   { min-height: 280px !important; }

    .rv-talk2-card        { padding: 36px 22px 32px !important; }
    .rv-talk2-title       { font-size: 34px !important; letter-spacing: -0.8px !important; }
    .rv-talk2-body        { font-size: 15px !important; }
    .rv-talk2-time-val    { font-size: 28px !important; }

    .rv-prog-row          { grid-template-columns: 1fr !important; gap: 6px !important; padding: 18px 18px !important; }
    .rv-prog-time         { font-size: 22px !important; }
    .rv-prog-h            { font-size: 19px !important; }

    .rv-tix-title         { font-size: 48px !important; letter-spacing: -1px !important; }
    .rv-tix-card          { padding: 28px 22px !important; }
    .rv-tix-label         { font-size: 20px !important; }
    .rv-tix-amount        { font-size: 62px !important; letter-spacing: -1.5px !important; }
    .rv-tix-cause         { font-size: 17px !important; }

    .rv-cta-wrap          { padding: 32px 14px 64px !important; }
    .rv-cta-box           { padding: 40px 24px !important; }
    .rv-cta-title         { font-size: 38px !important; letter-spacing: -0.8px !important; }
    .rv-cta-body          { font-size: 15px !important; margin-top: 18px !important; }
    .rv-cta-btn           { padding: 18px 22px !important; font-size: 15px !important; }
  }

  /* ---------- SMALL PHONE (≤ 380px) ---------- */
  @media (max-width: 380px) {
    .rv-nav-bname         { font-size: 15px !important; }
    .rv-hero-title        { font-size: 34px !important; }
    .rv-talk1-title       { font-size: 28px !important; }
    .rv-talk2-title       { font-size: 30px !important; }
    .rv-head-title        { font-size: 34px !important; }
    .rv-tix-amount        { font-size: 54px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="landing/copy.jsx"></script>
<script type="text/babel" src="landing/app.jsx"></script>
</body>
</html>
